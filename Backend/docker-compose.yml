name: Scenolytics

services:
  # ================= API GATEWAY =================
  api-gateway:
    build: ./API_Gateway
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT}:80"
    depends_on:
      - identity-provider-service
      - user-management-service
      - audition-training-service
      - ai-evaluation-service
      - casting-management-service
      - notification-service
      - minio
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= MESSAGE BROKER =================
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: scenolytics-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= IDENTITY PROVIDER =================
  identity-provider-mysql:
    image: mysql:8.0
    container_name: identity-provider-mysql
    environment:
      MYSQL_DATABASE: ${IDENTITY_PROVIDER_SERVICE_DATABASE_NAME}
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${IDENTITY_PROVIDER_SERVICE_DATABASE_PORT}:3306"
    volumes:
      - ./Identity_Provider_Service/create_database.sql:/docker-entrypoint-initdb.d/01_create_database.sql
      - ./Identity_Provider_Service/create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
      - identity_provider_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  identity-provider-service:
    build: ./Identity_Provider_Service
    environment:
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_PROVIDER_SERVICE_PORT: ${IDENTITY_PROVIDER_SERVICE_PORT}
      IDENTITY_PROVIDER_SERVICE_DATABASE_HOST: ${IDENTITY_PROVIDER_SERVICE_DATABASE_HOST}
      IDENTITY_PROVIDER_SERVICE_DATABASE_NAME: ${IDENTITY_PROVIDER_SERVICE_DATABASE_NAME}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
    deploy:
      replicas: 3
    ports:
      - "${IDENTITY_PROVIDER_SERVICE_PORT}-${IDENTITY_PROVIDER_SERVICE_END_PORT}:${IDENTITY_PROVIDER_SERVICE_PORT}"
    depends_on:
      identity-provider-mysql:
        condition: service_healthy
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= USER MANAGEMENT =================
  user-management-mysql:
    image: mysql:8.0
    container_name: user-management-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${USER_MANAGEMENT_SERVICE_DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${USER_MANAGEMENT_SERVICE_DATABASE_PORT}:3306"
    volumes:
      - ./User_Management_Service/create_database.sql:/docker-entrypoint-initdb.d/01_create_database.sql
      - ./User_Management_Service/create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
      - user_management_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  user-management-service:
    build: ./User_Management_Service
    environment:
      NODE_ENV: ${NODE_ENV}
      USER_MANAGEMENT_SERVICE_PORT: ${USER_MANAGEMENT_SERVICE_PORT}
      USER_MANAGEMENT_SERVICE_DATABASE_HOST: ${USER_MANAGEMENT_SERVICE_DATABASE_HOST}
      USER_MANAGEMENT_SERVICE_URL: ${USER_MANAGEMENT_SERVICE_URL}
      IDENTITY_PROVIDER_SERVICE_URL: ${IDENTITY_PROVIDER_SERVICE_URL}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      USER_MANAGEMENT_SERVICE_DATABASE_NAME: ${USER_MANAGEMENT_SERVICE_DATABASE_NAME}
      RABBITMQ_URL: ${RABBITMQ_URL}
    deploy:
      replicas: 3
    ports:
      - "${USER_MANAGEMENT_SERVICE_PORT}-${USER_MANAGEMENT_SERVICE_END_PORT}:${USER_MANAGEMENT_SERVICE_PORT}"
    depends_on:
      user-management-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= AUDITION TRAINING =================
  audition-training-mysql:
    image: mysql:8.0
    container_name: audition-training-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${AUDITION_TRAINING_SERVICE_DATABASE_NAME}
    ports:
      - "${AUDITION_TRAINING_SERVICE_DATABASE_PORT}:3306"
    volumes:
      - ./Audition_Training_Service/create_database.sql:/docker-entrypoint-initdb.d/01_create_database.sql
      - ./Audition_Training_Service/create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
      - audition_training_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  audition-training-service:
    build: ./Audition_Training_Service
    environment:
      NODE_ENV: ${NODE_ENV}
      AUDITION_TRAINING_SERVICE_PORT: ${AUDITION_TRAINING_SERVICE_PORT}
      AUDITION_TRAINING_SERVICE_DATABASE_HOST: ${AUDITION_TRAINING_SERVICE_DATABASE_HOST}
      AUDITION_TRAINING_SERVICE_URL: ${AUDITION_TRAINING_SERVICE_URL}
      IDENTITY_PROVIDER_SERVICE_URL: ${IDENTITY_PROVIDER_SERVICE_URL}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      AUDITION_TRAINING_SERVICE_DATABASE_NAME: ${AUDITION_TRAINING_SERVICE_DATABASE_NAME}
      RABBITMQ_URL: ${RABBITMQ_URL}
    deploy:
      replicas: 3
    ports:
      - "${AUDITION_TRAINING_SERVICE_PORT}-${AUDITION_TRAINING_SERVICE_END_PORT}:${AUDITION_TRAINING_SERVICE_PORT}"
    depends_on:
      audition-training-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= AI EVALUATION =================
  ai-evaluation-mysql:
    image: mysql:8.0
    container_name: ai-evaluation-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${AI_EVALUATION_SERVICE_DATABASE_NAME}
    ports:
      - "${AI_EVALUATION_SERVICE_DATABASE_PORT}:3306"
    volumes:
      - ./AI_Evaluation_Service/create_database.sql:/docker-entrypoint-initdb.d/01_create_database.sql
      - ./AI_Evaluation_Service/create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
      - ai_evaluation_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  ai-evaluation-service:
    build: ./AI_Evaluation_Service
    environment:
      NODE_ENV: ${NODE_ENV}
      AI_EVALUATION_SERVICE_PORT: ${AI_EVALUATION_SERVICE_PORT}
      AI_EVALUATION_SERVICE_DATABASE_HOST: ${AI_EVALUATION_SERVICE_DATABASE_HOST}
      AI_EVALUATION_SERVICE_URL: ${AI_EVALUATION_SERVICE_URL}
      IDENTITY_PROVIDER_SERVICE_URL: ${IDENTITY_PROVIDER_SERVICE_URL}
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      AI_EVALUATION_SERVICE_DATABASE_NAME: ${AI_EVALUATION_SERVICE_DATABASE_NAME}
      RABBITMQ_URL: ${RABBITMQ_URL}
    deploy:
      replicas: 3
    ports:
      - "${AI_EVALUATION_SERVICE_PORT}-${AI_EVALUATION_SERVICE_END_PORT}:${AI_EVALUATION_SERVICE_PORT}"
    depends_on:
      ai-evaluation-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= CASTING MANAGEMENT =================
  casting-management-mysql:
    image: mysql:8.0
    container_name: casting-management-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${CASTING_MANAGEMENT_SERVICE_DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "${CASTING_MANAGEMENT_SERVICE_DATABASE_PORT}:3306"
    volumes:
      - ./Casting_Management_Service/create_database.sql:/docker-entrypoint-initdb.d/01_create_database.sql
      - ./Casting_Management_Service/create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
      - casting_management_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${AWS_PORT}:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
      TZ: Cairo-2
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - scenolytics-network

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local ${AWS_ENDPOINT_URL} ${AWS_ACCESS_KEY_ID} ${AWS_SECRET_ACCESS_KEY};
      mc admin config set local api cors_allow_origin="*"
      mc mb --ignore-existing local/videos;
      mc mb --ignore-existing local/results;
      mc anonymous set download local/videos || true;
      exit 0;
      "
    networks:
      - scenolytics-network

  casting-management-service:
    build: ./Casting_Management_Service
    environment:
      TZ: Cairo-2
      NODE_ENV: ${NODE_ENV}
      CASTING_MANAGEMENT_SERVICE_PORT: ${CASTING_MANAGEMENT_SERVICE_PORT}
      CASTING_MANAGEMENT_SERVICE_DATABASE_HOST: ${CASTING_MANAGEMENT_SERVICE_DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT}
      CASTING_MANAGEMENT_SERVICE_DATABASE_NAME: ${CASTING_MANAGEMENT_SERVICE_DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_PROVIDER_SERVICE_URL: ${IDENTITY_PROVIDER_SERVICE_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_PORT: ${AWS_PORT}
      AWS_ENDPOINT_URL: ${AWS_ENDPOINT_URL}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET_VIDEOS: ${S3_BUCKET_VIDEOS}
      S3_BUCKET_RESULTS: ${S3_BUCKET_RESULTS}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    deploy:
      replicas: 3
    ports:
      - "${CASTING_MANAGEMENT_SERVICE_PORT}-${CASTING_MANAGEMENT_SERVICE_END_PORT}:${CASTING_MANAGEMENT_SERVICE_PORT}"
    depends_on:
      casting-management-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= NOTIFICATION =================
  notification-mysql:
    image: mysql:8.0
    container_name: notification-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${NOTIFICATION_SERVICE_DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}      
    ports:
      - "${NOTIFICATION_SERVICE_DATABASE_PORT}:3306"
    volumes:
      - ./Notification_Service/create_database.sql:/docker-entrypoint-initdb.d/01_create_database.sql
      - ./Notification_Service/create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
      - notification_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  notification-service:
    build: ./Notification_Service
    environment:
      NODE_ENV: ${NODE_ENV}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
      NOTIFICATION_SERVICE_DATABASE_HOST: ${NOTIFICATION_SERVICE_DATABASE_HOST}
      NOTIFICATION_SERVICE_URL: ${NOTIFICATION_SERVICE_URL}
      DATABASE_PORT: ${DATABASE_PORT}
      NOTIFICATION_SERVICE_DATABASE_NAME: ${NOTIFICATION_SERVICE_DATABASE_NAME}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SCENOLYTICS_MAIL: ${SCENOLYTICS_MAIL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:${NOTIFICATION_SERVICE_PORT}"
      - "${WEB_SOCKET_PORT}:${WEB_SOCKET_PORT}"
    depends_on:
      notification-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - scenolytics-network
    restart: unless-stopped

volumes:
  identity_provider_data:
    driver: local
  user_management_data:
    driver: local
  audition_training_data:
    driver: local
  ai_evaluation_data:
    driver: local
  casting_management_data:
    driver: local
  notification_data:
    driver: local
  minio_data:

networks:
  scenolytics-network:
    driver: bridge