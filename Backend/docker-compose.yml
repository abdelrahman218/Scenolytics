version: "3.9"

services:
  # ================= API GATEWAY =================
  api-gateway:
    build: ./API_Gateway
    container_name: api-gateway
    ports:
      - "80:80"
    depends_on:
      - identity-provider-service-1
      - identity-provider-service-2
      - identity-provider-service-3
      - user-management-service-1
      - user-management-service-2
      - user-management-service-3
      - audition-training-service-1
      - audition-training-service-2
      - audition-training-service-3
      - video-processing-service-1
      - video-processing-service-2
      - video-processing-service-3
      - ai-evaluation-service-1
      - ai-evaluation-service-2
      - ai-evaluation-service-3
      - casting-management-service-1
      - casting-management-service-2
      - casting-management-service-3
      - notification-service-1
      - notification-service-2
      - notification-service-3
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= MESSAGE BROKER =================
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: scenolytics-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= REDIS =================
  redis:
    image: redis:7-alpine
    container_name: scenolytics-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  # ================= IDENTITY PROVIDER =================
  identity-provider-mysql:
    image: mysql:8.0
    container_name: identity-provider-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${IDENTITY_PROVIDER_SERVICE_DATABASE_NAME}
    ports:
      - "33061:3306"
    volumes:
      - ./Identity_Provider_Service/create_database.sql:/docker-entrypoint-initdb.d/01_create_database.sql
      - ./Identity_Provider_Service/create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
      - identity_provider_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network
    restart: unless-stopped

  identity-provider-service-1:
    build: ./Identity_Provider_Service
    container_name: identity-provider-service-1
    environment:
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_PROVIDER_SERVICE_PORT: 5000
      IDENTITY_PROVIDER_SERVICE_DATABASE_HOST: identity-provider-mysql
      IDENTITY_PROVIDER_SERVICE_URL: http://identity-provider-service-1:5000
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      IDENTITY_PROVIDER_SERVICE_DATABASE_NAME: ${IDENTITY_PROVIDER_SERVICE_DATABASE_NAME}
    ports:
      - "5000:5000"
    depends_on:
      identity-provider-mysql:
        condition: service_healthy
    networks:
      - scenolytics-network
    restart: unless-stopped

  identity-provider-service-2:
    build: ./Identity_Provider_Service
    container_name: identity-provider-service-2
    environment:
      NODE_ENV: ${NODE_ENV}
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_PROVIDER_SERVICE_PORT: 5000
      IDENTITY_PROVIDER_SERVICE_DATABASE_HOST: identity-provider-mysql
      IDENTITY_PROVIDER_SERVICE_URL: http://identity-provider-service-2:5000
      DATABASE_PORT: ${DATABASE_PORT}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      IDENTITY_PROVIDER_SERVICE_DATABASE_NAME: ${IDENTITY_PROVIDER_SERVICE_DATABASE_NAME}
