name: Scenolytics-Backend-Services
services:
  identity-provider-mysql:
    image: mysql:8.0
    container_name: identity-provider-mysql
    environment:
      MYSQL_PORT: ${DATABASE_PORT:-3306}
      MYSQL_ROOT_PASSWORD: ${ROOT_PASSWORD}
      MYSQL_DATABASE: ${IDENTITY_PROVIDER_SERVICE_DATABASE_NAME:-identity_provider_db}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    ports:
      - "5432:${DATABASE_PORT:-3306}"
    volumes:
      - ./Identity_Provider_Service/create_database.sql:/docker-entrypoint-initdb.d/01_create_database.sql
      - ./Identity_Provider_Service/create_tables.sql:/docker-entrypoint-initdb.d/02_create_tables.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - scenolytics-network

  identity-provider-service:
    build: ./Identity_Provider_Service
    container_name: identity-provider-service
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET}
      IDENTITY_PROVIDER_SERVICE_PORT: ${IDENTITY_PROVIDER_SERVICE_PORT:-5000}
      IDENTITY_PROVIDER_SERVICE_DATABASE_HOST: ${IDENTITY_PROVIDER_SERVICE_DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      IDENTITY_PROVIDER_SERVICE_DATABASE_NAME: ${IDENTITY_PROVIDER_SERVICE_DATABASE_NAME}
    ports:
      - "${IDENTITY_PROVIDER_SERVICE_PORT:-5000}:${IDENTITY_PROVIDER_SERVICE_PORT:-5000}"
    depends_on:
      identity-provider-mysql:
        condition: service_healthy
    networks:
      - scenolytics-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  scenolytics-network:
    driver: bridge
