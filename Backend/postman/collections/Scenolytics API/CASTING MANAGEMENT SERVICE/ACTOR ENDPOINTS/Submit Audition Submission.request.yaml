$kind: http-request
url: "{{base_url}}/api/v1/casting/actor/auditions/:audition_id/submissions"
method: POST
headers:
  Content-Type: application/json
  Authorization: Bearer {{actor_token}}
pathVariables:
  audition_id: audition-id-123
body:
  type: text
  content: |-
    {
      "video_url": "https://example.com/submission.mp4"
    }
order: 5000
