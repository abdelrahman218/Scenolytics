$kind: http-request
name: Review Submission
url: "{{base_url}}/api/v1/casting/director/submissions/{{submission_id}}/review"
method: PATCH
headers:
  Content-Type: application/json
  Authorization: Bearer {{director_token}}
body:
  type: json
  content: |-
    {
      "status": "accepted",
      "director_notes": "Strong performance"
    }
order: 11000
