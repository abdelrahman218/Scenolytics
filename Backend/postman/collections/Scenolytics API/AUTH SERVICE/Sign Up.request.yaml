$kind: http-request
name: Sign Up
url: "{{base_url}}/api/v1/auth/signup"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "{{email}}",
      "password": "password123",
      "name": "John Doe",
      "gender": "Male",
      "age": 18,
      "role": "{{role}}"
    }
order: 1000
