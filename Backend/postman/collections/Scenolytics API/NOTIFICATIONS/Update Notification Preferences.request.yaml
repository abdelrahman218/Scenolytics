$kind: http-request
name: Update Notification Preferences
url: "{{base_url}}/api/v1/notifications/preferences"
method: PATCH
headers:
  Authorization: Bearer {{jwt_token}}
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "in_app_submission_notifications": true,
      "in_app_invitation_notifications": true,
      "email_submission_notifications": true,
      "email_invitation_notifications": true
    }
order: 1500
