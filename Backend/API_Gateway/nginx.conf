upstream identity_service {
    least_conn;
    server identity-provider-service:5000;
    server identity-provider-service:5001;
    server identity-provider-service:5002;
}

upstream user_service {
    least_conn;
    server user-management-service:5003;
    server user-management-service:5004;
    server user-management-service:5005;
}

upstream evaluation_service {
    least_conn;
    server ai-evaluation-service:5012;
}

upstream casting_service {
    least_conn;
    server casting-management-service:5013;
    server casting-management-service:5014;
    server casting-management-service:5015;
}

upstream notification_service {
    least_conn;
    server notification-service:5016;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 500M;

    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # API Gateway routing
    
    # Identity & Auth Service
    location ~ ^/api/v1/auth(/|$) {
        rewrite ^/api/v1/auth(.*)$ /auth$1 break;
        proxy_pass http://identity_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI Evaluation Service
    location ~ ^/api/v1/evaluate(/|$) {
        rewrite ^/api/v1/evaluate(.*)$ /api/evaluations$1 break;
        proxy_pass http://evaluation_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI Evaluation Service (Alternative route)
    location ~ ^/api/v1/evaluations(/|$) {
        rewrite ^/api/v1/evaluations(.*)$ /api/evaluations$1 break;
        proxy_pass http://evaluation_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Casting Management Service
    location ~ ^/api/v1/casting(/|$) {
        rewrite ^/api/v1/casting(.*)$ $1 break;
        proxy_pass http://casting_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Notification Service
    location ~ ^/api/v1/notifications(/|$) {
        rewrite ^/api/v1/notifications(.*)$ /notifications$1 break;
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User Management Service
    location ~ ^/api/v1/users-management(/|$) {
        rewrite ^/api/v1/users-management(.*)$ /users-management$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/profiles(/|$) {
        rewrite ^/api/v1/profiles(.*)$ /profiles$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User Service - Actor/Director Profiles
    location ~ ^/api/v1/actors(/|$) {
        rewrite ^/api/v1/actors(.*)$ /actors$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/directors(/|$) {
        rewrite ^/api/v1/directors(.*)$ /directors$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MinIO bucket "videos" — keys uploads/{media_id}.mp4 (Flutter: SCENO_VIDEO_PUBLIC_BASE + /uploads/…).
    # ^~ stops prefix search so this wins over "location /" and is easier to reason about than regex order.
    # Variable proxy_pass + Docker DNS so nginx does not fail at startup if minio is not yet resolvable.
    location ^~ /api/v1/storage/videos/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, PUT, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Content-Length,X-Amz-Date,X-Amz-Content-Sha256,Authorization,X-Amz-Security-Token,X-Amz-Algorithm,X-Amz-Credential,X-Amz-Signature,X-Amz-SignedHeaders';
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range,ETag';
            add_header 'Access-Control-Max-Age' '86400';
            return 204;
        }

        resolver 127.0.0.11 valid=10s ipv6=off;
        set $minio_upstream http://minio:9000;
        rewrite ^/api/v1/storage/videos/(.*)$ /videos/$1 break;
        proxy_pass $minio_upstream;
        proxy_set_header Host minio:9000;
        proxy_hide_header x-amz-request-id;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        add_header Access-Control-Allow-Origin '*' always;
        add_header Access-Control-Allow-Methods 'GET, HEAD, PUT, OPTIONS' always;
        add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Content-Length,X-Amz-Date,X-Amz-Content-Sha256,Authorization,X-Amz-Security-Token,X-Amz-Algorithm,X-Amz-Credential,X-Amz-Signature,X-Amz-SignedHeaders' always;
        add_header Access-Control-Expose-Headers 'Content-Length,Content-Range,ETag' always;
    }
    
    # Catch-all for unmatched routes
    location / {
        return 404 "API endpoint not found. Use /api/v1/* for API calls or /health for health check";
        add_header Content-Type text/plain;
    }
}