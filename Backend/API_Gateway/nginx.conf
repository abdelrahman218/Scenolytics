upstream identity_service {
    least_conn;
    server identity-provider-service:5000;
    server identity-provider-service:5001;
    server identity-provider-service:5002;
}

upstream user_service {
    least_conn;
    server user-management-service:5003;
    server user-management-service:5004;
    server user-management-service:5005;
}

upstream audition_service {
    least_conn;
    server audition-training-service:5006;
    server audition-training-service:5007;
    server audition-training-service:5008;
}

upstream video_service {
    least_conn;
    server video-processing-service:5009;
    server video-processing-service:5010;
    server video-processing-service:5011;
}

upstream evaluation_service {
    least_conn;
    server ai-evaluation-service:50012;
    server ai-evaluation-service:50013;
    server ai-evaluation-service:50014;
}

upstream casting_service {
    least_conn;
    server casting-management-service:5015;
    server casting-management-service:5016;
    server casting-management-service:5017;
}

upstream notification_service {
    least_conn;
    server notification-service:5018;
    server notification-service:5019;
    server notification-service:5020;
}

server {
    listen 80;
    server_name localhost;
    client_max_body_size 500M;

    # Health check endpoint
    location /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # API Gateway routing
    
    # Identity & Auth Service
    location ~ ^/api/v1/auth(/|$) {
        rewrite ^/api/v1/auth(.*)$ /auth$1 break;
        proxy_pass http://identity_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Audition Management Service
    location ~ ^/api/v1/auditions(/|$) {
        rewrite ^/api/v1/auditions(.*)$ /auditions$1 break;
        proxy_pass http://audition_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/portfolios(/|$) {
        rewrite ^/api/v1/portfolios(.*)$ /portfolios$1 break;
        proxy_pass http://audition_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Video Processing Service
    location ~ ^/api/v1/videos(/|$) {
        rewrite ^/api/v1/videos(.*)$ /videos$1 break;
        proxy_pass http://video_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Large file upload support
        proxy_request_buffering off;
        proxy_buffering off;
    }

    # AI Evaluation Service
    location ~ ^/api/v1/evaluate(/|$) {
        rewrite ^/api/v1/evaluate(.*)$ /evaluate$1 break;
        proxy_pass http://evaluation_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Casting Management Service
    location ~ ^/api/v1/casting(/|$) {
        rewrite ^/api/v1/casting(.*)$ /$1 break;
        proxy_pass http://casting_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Notification Service
    location ~ ^/api/v1/notifications(/|$) {
        rewrite ^/api/v1/notifications(.*)$ /notifications$1 break;
        proxy_pass http://notification_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User Management Service
    location ~ ^/api/v1/users-management(/|$) {
        rewrite ^/api/v1/users-management(.*)$ /users-management$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/profiles(/|$) {
        rewrite ^/api/v1/profiles(.*)$ /profiles$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AI Evaluation Service - Evaluations
    location ~ ^/api/v1/evaluations(/|$) {
        rewrite ^/api/v1/evaluations(.*)$ /evaluations$1 break;
        proxy_pass http://evaluation_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Audition Training Service - Training Sessions
    location ~ ^/api/v1/sessions(/|$) {
        rewrite ^/api/v1/sessions(.*)$ /sessions$1 break;
        proxy_pass http://audition_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # User Service - Actor/Director Profiles
    location ~ ^/api/v1/actors(/|$) {
        rewrite ^/api/v1/actors(.*)$ /actors$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/v1/directors(/|$) {
        rewrite ^/api/v1/directors(.*)$ /directors$1 break;
        proxy_pass http://user_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Video Processing Service - Upload & Media Management
    location ~ ^/api/v1/upload(/|$) {
        rewrite ^/api/v1/upload(.*)$ /upload$1 break;
        proxy_pass http://video_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Large file upload support
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location ~ ^/api/v1/media(/|$) {
        rewrite ^/api/v1/media(.*)$ /media$1 break;
        proxy_pass http://video_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Large file upload support
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location ~ ^/api/v1/jobs(/|$) {
        rewrite ^/api/v1/jobs(.*)$ /jobs$1 break;
        proxy_pass http://video_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Catch-all for unmatched routes
    location / {
        return 404 "API endpoint not found. Use /api/v1/* for API calls or /health for health check";
        add_header Content-Type text/plain;
    }
}